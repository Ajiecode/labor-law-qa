<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劳动法智能问答系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .settings {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        .settings h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1rem;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 0.9rem;
        }
        .input-group input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .chat-container {
            height: 500px;
            display: flex;
            flex-direction: column;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            text-align: right;
        }
        .message-content {
            display: inline-block;
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.bot .message-content {
            background: white;
            color: #333;
            border: 1px solid #eee;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .message.bot .message-content .reference {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-size: 0.85rem;
            color: #888;
        }
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #eee;
            border-radius: 25px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }
        .input-area button {
            padding: 14px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            display: inline-block;
            padding: 12px 18px;
            background: white;
            border: 1px solid #eee;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            color: #666;
        }
        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        .info-box {
            background: #e8f4fd;
            border: 1px solid #b8daff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .info-box h4 {
            color: #004085;
            margin-bottom: 8px;
        }
        .info-box ol {
            color: #004085;
            padding-left: 20px;
            font-size: 0.9rem;
        }
        .info-box li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚖️ 劳动法智能问答</h1>
            <p>基于《劳动合同法》的智能法律咨询助手</p>
        </div>
        
        <div class="card">
            <div class="settings">
                <h3>🔧 API 配置</h3>
                <div class="input-group">
                    <label>Dify API URL:</label>
                    <input type="text" id="apiUrl" placeholder="例如: https://api.dify.ai/v1" value="https://api.dify.ai/v1">
                </div>
                <div class="input-group">
                    <label>API Key:</label>
                    <input type="password" id="apiKey" placeholder="请输入您的Dify API Key">
                </div>
                <div class="input-group">
                    <label>应用ID (App ID):</label>
                    <input type="text" id="appId" placeholder="请输入您的Dify应用ID">
                </div>
                <div class="info-box">
                    <h4>📋 配置步骤:</h4>
                    <ol>
                        <li>登录 <a href="https://dify.ai" target="_blank">Dify.ai</a> 或阿里云DMS</li>
                        <li>创建一个RAG应用，上传《劳动合同法》文档</li>
                        <li>发布应用，获取 App ID 和 API Key</li>
                        <li>将 App ID 和 API Key 填入上方配置</li>
                    </ol>
                </div>
            </div>
            
            <div class="chat-container">
                <div class="messages" id="messages">
                    <div class="message bot">
                        <div class="message-content">
您好！我是劳动法智能问答助手🤖

我可以帮您解答关于《劳动合同法》的问题，例如：
• 劳动合同的签订与试用期
• 工资与加班费相关规定
• 社会保险与福利待遇
• 劳动合同的解除与终止
• 经济补偿与赔偿金

请先在上方配置好Dify API，然后开始咨询！
                        </div>
                    </div>
                </div>
                
                <div class="input-area">
                    <input type="text" id="question" placeholder="请输入您的劳动法问题..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendQuestion()" id="sendBtn">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let conversationId = '';
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendQuestion();
            }
        }
        
        async function sendQuestion() {
            const questionInput = document.getElementById('question');
            const question = questionInput.value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const appId = document.getElementById('appId').value.trim();
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const sendBtn = document.getElementById('sendBtn');
            
            if (!question) return;
            if (!apiKey || !appId) {
                alert('请先配置 API Key 和 App ID');
                return;
            }
            
            addMessage(question, 'user');
            questionInput.value = '';
            
            const loadingId = addLoadingMessage();
            sendBtn.disabled = true;
            
            try {
                const response = await fetch(`${apiUrl}/workflows/run`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inputs: {
                            query: question
                        },
                        response_mode: 'blocking',
                        user: 'labor-law-user'
                    })                // 这里是body的结束
                });
                
                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status}`);
                }
                
                const data = await response.json();
                
                removeMessage(loadingId);
                
                let answer = '';
                
                if (data.data && data.data.outputs) {
                    answer = data.data.outputs.answer || data.data.outputs.text || JSON.stringify(data.data.outputs);
                } else if (data.answer) {
                    answer = data.answer;
                } else {
                    answer = JSON.stringify(data);
                }
                
                let referenceInfo = '';
                if (data.metadata && data.metadata.retriever_resources && data.metadata.retriever_resources.length > 0) {
                    referenceInfo = '\n\n📚 参考来源:\n';
                    data.metadata.retriever_resources.forEach((ref, index) => {
                        referenceInfo += `${index + 1}. ${ref.document_name || '劳动合同法'}\n`;
                    });
                }
                
                addMessage(answer + referenceInfo, 'bot');
                
            } catch (error) {
                removeMessage(loadingId);
                addMessage(`❌ 错误: ${error.message}`, 'bot');
            }
            
            sendBtn.disabled = false;
            questionInput.focus();
        }
        
        function addMessage(content, type) {
            const messages = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function addLoadingMessage() {
            const messages = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = 'loading-' + Date.now();
            messageDiv.innerHTML = '<div class="loading">正在思考中</div>';
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
            return messageDiv.id;
        }
        
        function removeMessage(messageId) {
            const element = document.getElementById(messageId);
            if (element) {
                element.remove();
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 保存配置到localStorage
        document.getElementById('apiKey').value = localStorage.getItem('dify_api_key') || '';
        document.getElementById('appId').value = localStorage.getItem('dify_app_id') || '';
        document.getElementById('apiUrl').value = localStorage.getItem('dify_api_url') || 'https://api.dify.ai/v1';
        
        document.getElementById('apiKey').addEventListener('change', function() {
            localStorage.setItem('dify_api_key', this.value);
        });
        document.getElementById('appId').addEventListener('change', function() {
            localStorage.setItem('dify_app_id', this.value);
        });
        document.getElementById('apiUrl').addEventListener('change', function() {
            localStorage.setItem('dify_api_url', this.value);
        });
    </script>
</body>
</html>
